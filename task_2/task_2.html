<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
    <link rel="stylesheet" href="task_2.css">
</head>
<body>

<div class="calculator">

    <div class="calculator_display">
        <button class="history" id="openHistory"></button>
        <input class="calculator_input" placeholder="Введите число" readonly>
    </div>

    <div class="calculator_key">

        <button class="clear">C</button>
        <button class="delete">⌫</button>
        <button class="ans">Ans</button>
        <button class="divide" data-value="/">/</button>
        <button class="num" data-value="7">7</button>
        <button class="num" data-value="8">8</button>
        <button class="num" data-value="9">9</button>
        <button class="multiply" data-value="*">*</button>
        <button class="num" data-value="4">4</button>
        <button class="num" data-value="5">5</button>
        <button class="num" data-value="6">6</button>
        <button class="minus" data-value="-">-</button>
        <button class="num" data-value="1">1</button>
        <button class="num" data-value="2">2</button>
        <button class="num" data-value="3">3</button>
        <button class="plus" data-value="+">+</button>
        <button class="num" data-value="0">0</button>
        <button class="point" data-value=".">.</button>
        <button class="equal">=</button>

    </div>

</div>


<div id="historyModal" class="modal">
    <div class="modal-content">
        <span class="close" id="closeHistory">×</span>
        <h3>История</h3>
        <div id="historyList">
            <p>Пока пусто</p>
        </div>
    </div>
</div>

<script src="task_2.js"></script>

</body>
</html>
